name: 'Sync argocd application'
description: 'This composite action connects will sync current application in ArgoCD and wait for sync to be ok'
inputs:
  app_name:
    type: string
    description: The application to sync on ArgoCD
    required: true
  sync_timeout:
    description: The timeout to wait for before aborting the sync
    required: false
    default: 600
  retry_backoff_duration:
    description: Retry backoff base duration.
    required: false
    default: '5s'
  retry_backoff_factor:
    description: Factor multiplies the base duration after each failed retry
    required: false
    default: 1
  retry_backoff_max_duration:
    description: Max retry backoff duration.
    required: false
    default: '1m'
  retry_limit:
    description: Max number of retries
    required: false
    default: 0
  argocd_app_wait:
    description: Whether or not to execute argocd app wait
    required: false
    default: false
  prune:
    description: Wether or not to use argocd prune option
    required: false
    default: false
  extra_flags:
    description: Additional flags that you want to pass to argocd sync
    required: false
    default: ""

runs:
  using: 'composite'
  steps:
    - name: "Install argocd cli"
      id: install_argocd_cli
      shell: bash
      run: |
        curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
        rm argocd-linux-amd64

    - name: "Check argocd application status"
      id: check_status
      shell: bash
      run: |
        kubectl config set-context --current --namespace=argocd
        argocd_app_sync=(argocd app sync "$APP_NAME" --core --apply-out-of-sync-only --retry-limit "$RETRY_LIMIT" --retry-backoff-duration "$RETRY_BACKOFF_DURATION" --retry-backoff-factor "$RETRY_BACKOFF_FACTOR" --retry-backoff-max-duration "$RETRY_BACKOFF_MAX_DURATION" --timeout "$SYNC_TIMEOUT" ${{ inputs.extra_flags }})
        if [ "$PRUNE" == 'true' ]; then
          argocd_app_sync+=(--prune)
        fi
        "${argocd_app_sync[@]}"
        if [ "$ARGOCD_APP_WAIT" == 'true' ]; then
          argocd app wait "$APP_NAME" --core
        fi
      env:
        APP_NAME: ${{ inputs.app_name }}
        RETRY_LIMIT: ${{ inputs.retry_limit }}
        RETRY_BACKOFF_DURATION: ${{ inputs.retry_backoff_duration }}
        RETRY_BACKOFF_FACTOR: ${{ inputs.retry_backoff_factor }}
        RETRY_BACKOFF_MAX_DURATION: ${{ inputs.retry_backoff_max_duration }}
        SYNC_TIMEOUT: ${{ inputs.sync_timeout }}
        PRUNE: ${{ inputs.prune }}
        ARGOCD_APP_WAIT: ${{ inputs.argocd_app_wait }}
