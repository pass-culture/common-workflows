name: Install firebase tools CLI
description: An action to install firebase tools CLI in our runners
inputs:
  version:
    description: The firebase-tools version
    required: false
    default: 15.18.0

runs:
  using: composite
  steps:
    - name: Setup firebase
      shell: bash
      env:
        FIREBASE_CLI_VERSION: ${{ inputs.version }}
      run: |
        npm install -g "firebase-tools@$FIREBASE_CLI_VERSION"
